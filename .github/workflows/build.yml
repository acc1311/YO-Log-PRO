name: Build YO Log PRO Executable

on:
  push:
    tags:
      - 'v*'  # Se declanșează când încarci un tag (ex: v1.0, v1.1)
  workflow_dispatch: # Permite rularea manuală din tab-ul Actions

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # Versiunea recomandată pentru PyInstaller

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --name "YOLogPRO" `
                    --onefile `
                    --windowed `
                    --icon "icon.ico" `
                    --clean `
                    --noconfirm `
                    --add-data "contests.json;." `
                    --add-data "config.json;." `
                    yo_log_pro.py
      shell: pwsh

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/YOLogPRO.exe
        name: Release ${{ github.ref_name }}
        body: |
          YO Log PRO Executable pentru Windows.
          Include suport pentru Maraton, Stafeta, YO-DX si Log Simplu.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: YOLogPRO-Windows
        path: dist/YOLogPRO.exe
